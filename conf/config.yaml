defaults:
  - _self_
  - data: tiny_imagenet
  - model: pi_img
  - optim: adam
  - topo: pi
  - override hydra/job_logging: default

run_name: ""               # set per-run; empty means "unnamed run"
seed: 119

train:
  epochs: 50
  batch_size: 64
  num_workers: 2
  val_size: 0.2
  compile: true            # whether to torch.compile the model
  save_model: false        # was --sm

hydra:
  run:
    dir: outputs/${run_name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}
